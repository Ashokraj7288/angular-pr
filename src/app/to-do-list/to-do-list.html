<div class="todo-container">

  <h2>My To Do List</h2>

 <div class="input-section">
    <input type="text" [(ngModel)]="taskTitle" placeholder="Enter a new task">

    <input type="datetime-local" [(ngModel)]="taskDate">

    <button (click)="addTask()">Add Task</button>
  </div>

 <ul class="task-list">
    <li *ngFor="let task of tasks; let i = index" [class.completed]="task.completed">
   <div>
        <strong>{{ task.title }}</strong>
        <br>
        <small>Due: {{ task.date | date:'medium' }}</small>
      </div>

 <div class="actions">
        <button (click)="toggleComplete(task)">
          Done
        </button>

          <button (click)="deleteTask(i)">
          Delete
        </button>

        
      </div>

    </li>
  </ul>

</div>
