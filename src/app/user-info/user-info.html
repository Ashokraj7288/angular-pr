<div class="pageheader d-flex justify-content-between align-items-center mb-3">
  <h5>User Information</h5>
  <button class="btn btn-outline-primary" (click)="openDialog()">
    Add User
  </button>
</div>

<table class="table table-bordered">
  <thead>
    <tr>
      <th>#</th>
      <th>First</th>
      <th>Last</th>
      <th>User Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>City</th>
      <th>State</th>
      <th>Zip</th>
      <th>Img</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let user of users; let i = index">

      <td>{{ i + 1 }}</td>
      <td>{{ user.firstName }}</td>
      <td>{{ user.lastName }}</td>
      <td>{{ user.userName }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.phone }}</td>
      <td>{{ user.city }}</td>
      <td>{{ user.state }}</td>
      <td>{{ user.zip }}</td>

      <td>
        <img *ngIf="user.image_path" [src]="'http://localhost:3000/' + user.image_path" width="80">
      </td>

      <td>
        <button class="btn btn-danger btn-sm" (click)="onDelete(user)">Delete</button>
        <button class="btn btn-info btn-sm" (click)="onEdit(user)">View</button>
      </td>

    </tr>
  </tbody>
</table>


<!-- MODAL -->
<ng-container *ngIf="isModalOpen">

  <div class="modal fade show d-block">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">User Information</h5>
          <button class="btn-close" (click)="closeModal()"></button>
        </div>

        <div class="modal-body">

          <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="row g-3">

            <div class="col-md-4">
              <label>First Name</label>
              <input class="form-control" formControlName="firstName">
            </div>

            <div class="col-md-4">
              <label>Last Name</label>
              <input class="form-control" formControlName="lastName">
            </div>

            <div class="col-md-4">
              <label>User Name</label>
              <input class="form-control" formControlName="userName">
            </div>

            <div class="col-md-4">
              <label>Email</label>
              <input class="form-control" formControlName="email">
            </div>

            <div class="col-md-4">
              <label>Phone</label>
              <input class="form-control" formControlName="phone">
            </div>

            <div class="col-md-4">
              <label>State</label>
              <select class="form-select" formControlName="state">
                <option value="">Select</option>
                <option value="MH">Maharashtra</option>
                <option value="TN">Tamil Nadu</option>
                <option value="KA">Karnataka</option>
              </select>
            </div>

            <div class="col-md-4">
              <label>City</label>
              <input class="form-control" formControlName="city">
            </div>

            <div class="col-md-4">
              <label>Zip</label>
              <input class="form-control" formControlName="zip">
            </div>

            <!-- IMAGE -->
            <div class="col-12">
              <label>Profile Image</label>

              <input type="file" class="form-control" accept="image/*" (change)="onFileSelected($event)">

              <div *ngIf="imagePreview" class="mt-3">
                <img [src]="imagePreview" class="img-thumbnail" style="max-width:200px">

                <button type="button" class="btn btn-danger btn-sm mt-2" (click)="removeImage()">
                  Remove
                </button>
              </div>
            </div>

            <div class="col-12">
              <button class="btn btn-primary" type="submit">
                Submit
              </button>
            </div>

          </form>

        </div>

      </div>
    </div>
  </div>

</ng-container>
